name: Build image on PR

on:
  pull_request:
  merge_group:

jobs:
  build-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build image
        run: docker buildx build --cache-to type=gha,mode=max --cache-from type=gha .

